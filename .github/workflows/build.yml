name: Build Transparent Board EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyYAML pyinstaller

    - name: Build EXE with PyInstaller
      # config.yaml 경로를 점(.)으로 확실히 지정합니다.
      run: |
        pyinstaller --noconsole --onefile --clean --add-data "config.yaml;." main.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TransparentBoard-Windows-EXE
        path: dist/main.exe
