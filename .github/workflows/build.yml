name: Build Transparent Board EXE

on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 PyYAML pyinstaller

    - name: Build EXE with PyInstaller
      # --collect-all 옵션은 PyQt5의 복잡한 의존성을 안전하게 묶어줍니다.
      run: |
        pyinstaller --noconsole --onefile --clean --add-data "config.yaml;." main.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TransparentBoard-Windows-EXE
        path: dist/main.exe
        retention-days: 5
